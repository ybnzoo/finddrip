    <header class="dash-topbar">
      <h1 class="dash-page-title">Rechercher</h1>

        <button class="dash-notif"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="dash-notif-dot"></span></button>

    <div class="dash-content">

      <!-- SEARCH BAR -->
      <div class="dash-section">
        <div class="search-bar-wrap">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" type="text" id="searchInput" placeholder="Rechercher un vêtement, une marque…" autofocus />
        </div>

        <!-- FILTRES PLATEFORME -->
        <div class="categories-scroll" id="platformFilter">
          <button class="cat-pill active" data-platform="all">Tout</button>
          <button class="cat-pill" data-platform="Weidian">Weidian</button>
          <button class="cat-pill" data-platform="Taobao">Taobao</button>
          <button class="cat-pill" data-platform="1688">1688</button>
        </div>

        <!-- RÉSULTATS -->
        <div id="searchStats" style="font-size:13px;color:var(--text-muted);font-weight:500;display:none"></div>
      </div>

      <!-- GRILLE RÉSULTATS -->
      <div class="search-results-grid" id="resultsGrid"></div>

      <!-- ÉTAT VIDE -->
      <div class="search-empty" id="searchEmpty" style="display:none">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>Tape un nom de produit ou de marque</p>
        <span>1 623 références disponibles</span>
