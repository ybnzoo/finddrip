  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../auth/supabase-config.js"></script>
  <script src="../auth/guard.js"></script>
  <script>
    // Charger l'historique depuis Supabase
    (async () => {
      if (typeof sb === 'undefined') return;
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;

      const { data: searches } = await sb.from('searches')
        .select('*')
        .eq('user_id', session.user.id)
        .order('created_at', { ascending: false })
        .limit(50);

      const histoList = document.getElementById('histoList');
      const histoCount = document.getElementById('histoCount');

      if (!searches || searches.length === 0) {
        histoList.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;padding:40px 0">Aucune recherche pour le moment. Fais ta première recherche !</p>';
        histoCount.textContent = '0 recherche effectuée';
        return;
      }

      histoCount.textContent = searches.length + ' recherche' + (searches.length > 1 ? 's' : '') + ' effectuée' + (searches.length > 1 ? 's' : '');

      // Grouper par date
      const groups = {};
      const today = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();

      searches.forEach(s => {
        const d = new Date(s.created_at).toDateString();
        let label;
        if (d === today) label = "Aujourd'hui";
        else if (d === yesterday) label = 'Hier';
        else label = new Date(s.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
        if (!groups[label]) groups[label] = [];
        groups[label].push(s);
      });

      let html = '';
      for (const [label, items] of Object.entries(groups)) {
        html += '<div class="histo-group-label">' + label + '</div><div class="dash-recent-list">';
        items.forEach(item => {
          const time = new Date(item.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
          html += '<div class="dash-recent-item"><div class="dash-recent-info"><span class="dash-recent-name">' + item.query + '</span><span class="dash-recent-meta">' + time + '</span></div><a href="recherche.html?q=' + encodeURIComponent(item.query) + '" class="dash-recent-open"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></a></div>';
        });
        html += '</div>';
      }
      histoList.innerHTML = html;

      // Clear button
      document.getElementById('histoClearBtn').addEventListener('click', async () => {
        await sb.from('searches').delete().eq('user_id', session.user.id);
        histoList.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;padding:40px 0">Historique effacé.</p>';
        histoCount.textContent = '0 recherche effectuée';
      });
    })();
  </script>
