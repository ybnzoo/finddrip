<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>FindDrip — Connexion</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-page">

    <!-- LEFT — branding -->
    <div class="auth-left">
      <a href="../index.html" class="auth-logo">
        <span class="logo-find">Find</span><span class="logo-drip">Drip.</span>
      </a>
      <div class="auth-left-content">
        <h2 class="auth-left-title">Retrouve n'importe quel vêtement<br>en <span class="purple-text">2 secondes.</span></h2>
        <p class="auth-left-sub">250 000+ références · Weidian · Taobao · 1688</p>
        <div class="auth-left-cards">
          <div class="auth-preview-card">
            <div class="auth-preview-img" style="background-image:url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200&q=80')"></div>
            <div class="auth-preview-info">
              <span class="auth-preview-name">Nike Air Force 1</span>
              <span class="auth-preview-price">€ 185</span>
            </div>
          </div>
          <div class="auth-preview-card">
            <div class="auth-preview-img" style="background-image:url('https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=200&q=80')"></div>
            <div class="auth-preview-info">
              <span class="auth-preview-name">Adidas Samba OG</span>
              <span class="auth-preview-price">€ 210</span>
            </div>
          </div>
          <div class="auth-preview-card">
            <div class="auth-preview-img" style="background-image:url('https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=200&q=80')"></div>
            <div class="auth-preview-info">
              <span class="auth-preview-name">Nike Dunk Low</span>
              <span class="auth-preview-price">€ 220</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT — form -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        <div class="auth-form-header">
          <a href="../index.html" class="auth-logo auth-logo-mobile">
            <span class="logo-find">Find</span><span class="logo-drip">Drip.</span>
          </a>
          <h1 class="auth-title">Connexion</h1>
          <p class="auth-sub">Content de te revoir 👋</p>
        </div>

        <form class="auth-form" id="loginForm">

          <div class="auth-field">
            <label class="auth-label">Email</label>
            <div class="auth-input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" class="auth-input" placeholder="ton@email.com" required />
            </div>
          </div>

          <div class="auth-field">
            <div class="auth-label-row">
              <label class="auth-label">Mot de passe</label>
              <a href="#" class="auth-forgot">Mot de passe oublié ?</a>
            </div>
            <div class="auth-input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" class="auth-input" id="passwordInput" placeholder="••••••••" required />
              <button type="button" class="auth-eye" id="togglePassword">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-btn">
            Se connecter
          </button>

          <div class="auth-divider"><span>ou</span></div>

          <button type="button" class="auth-social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continuer avec Google
          </button>

        </form>

        <p class="auth-switch">
          Pas encore de compte ?
          <a href="inscription.html">S'inscrire gratuitement</a>
        </p>

      </div>
    </div>

  </div>

  <script src="auth.js"></script>
</body>
</html>
